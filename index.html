<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Image</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h2>Atardecer Marino</h2>
    <img width="40%" style="border: none;" src="https://images.unsplash.com/photo-1771871028054-1f0d8f9f2e12?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw2NHx8fGVufDB8fHx8fA%3D%3D" id="imgBordes" alt="atardecer"
    onclick="
        let imagen = document.querySelector('#imgBordes')
        if(imagen.style.border == 'none'){
            imagen.style.border = '2px solid red'
         }else{
            imagen.style.border = 'none'
        }
    ">


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
</body>
</html>
